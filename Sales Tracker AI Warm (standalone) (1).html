document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 19V11M12 19V5M19 19v-6\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:10.5px; font-weight:600;\">รายงาน<\u002Fspan>\n              <\u002Fbutton>\n              <button onclick=\"{{ goSales }}\" style=\"flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;\">\n                <div style=\"width:50px; height:50px; border-radius:50%; background:#b06a43; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px rgba(176,106,67,.4); transform:translateY(-14px);\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 6v12M6 12h12\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <span style=\"font-size:10.5px; font-weight:700; color:#b06a43; margin-top:-10px;\">ขาย<\u002Fspan>\n              <\u002Fbutton>\n              <button onclick=\"{{ goAi }}\" style=\"flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color: {{ cAi }};\">\n                <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6z\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:10.5px; font-weight:600;\">AI<\u002Fspan>\n              <\u002Fbutton>\n              <button onclick=\"{{ goHub }}\" style=\"flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color: {{ cHub }};\">\n                <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"4\" width=\"7\" height=\"7\" rx=\"1.6\"><\u002Frect><rect x=\"13\" y=\"4\" width=\"7\" height=\"7\" rx=\"1.6\"><\u002Frect><rect x=\"4\" y=\"13\" width=\"7\" height=\"7\" rx=\"1.6\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"7\" height=\"7\" rx=\"1.6\"><\u002Frect><\u002Fsvg>\n                <span style=\"font-size:10.5px; font-weight:600;\">รวม<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- ===== PAYMENT SHEET ===== -->\n            <sc-if value=\"{{ payOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute; inset:0; background:rgba(46,29,18,.45); animation:fadeIn .2s ease; display:flex; flex-direction:column; justify-content:flex-end;\" onclick=\"{{ onClosePay }}\">\n                <div style=\"background:#fff; border-radius:26px 26px 32px 32px; padding:22px 22px 28px; animation:sheetUp .28s cubic-bezier(.22,1,.36,1);\" onclick=\"{{ stop }}\">\n                  <div style=\"width:38px; height:4px; border-radius:3px; background:#e4d6c5; margin:0 auto 18px;\"><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:14px;\">\n                    <div style=\"width:54px; height:54px; border-radius:20px; background:#f6ede1; display:flex; align-items:center; justify-content:center; font-size:28px;\">{{ payEmoji }}<\u002Fdiv>\n                    <div style=\"flex:1;\">\n                      <div style=\"font-size:16px; font-weight:600; color:#4a3526;\">{{ payName }}<\u002Fdiv>\n                      <div style=\"font-size:13px; color:#ab9683;\">เลือกวิธีชำระเงิน<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:24px; font-weight:700; color:#b06a43;\">{{ payPriceStr }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; gap:12px; margin-top:20px;\">\n                    <button onclick=\"{{ onPayCash }}\" style=\"flex:1; border:none; border-radius:20px; padding:16px 0; background:#e8f5ee; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:5px;\" style-active=\"transform:scale(.97)\">\n                      <span style=\"font-size:24px;\">💵<\u002Fspan>\n                      <span style=\"font-size:15px; font-weight:700; color:#2f9e6b;\">เงินสด<\u002Fspan>\n                    <\u002Fbutton>\n                    <button onclick=\"{{ onPayTransfer }}\" style=\"flex:1; border:none; border-radius:20px; padding:16px 0; background:#eaf0fd; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:5px;\" style-active=\"transform:scale(.97)\">\n                      <span style=\"font-size:24px;\">📲<\u002Fspan>\n                      <span style=\"font-size:15px; font-weight:700; color:#3b6fe0;\">โอนเงิน<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ onClosePay }}\" style=\"width:100%; margin-top:12px; border:none; background:none; color:#ab9683; font-size:14px; font-family:inherit; cursor:pointer; padding:8px;\">ยกเลิก<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== PRODUCT EDITOR SHEET ===== -->\n            <sc-if value=\"{{ editorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute; inset:0; background:rgba(46,29,18,.45); animation:fadeIn .2s ease; display:flex; flex-direction:column; justify-content:flex-end;\" onclick=\"{{ onCloseEditor }}\">\n                <div style=\"background:#fff; border-radius:26px 26px 32px 32px; padding:22px 22px 28px; animation:sheetUp .28s cubic-bezier(.22,1,.36,1);\" onclick=\"{{ stop }}\">\n                  <div style=\"width:38px; height:4px; border-radius:3px; background:#e4d6c5; margin:0 auto 16px;\"><\u002Fdiv>\n                  <div style=\"font-size:17px; font-weight:600; color:#4a3526; margin-bottom:16px;\">{{ editorTitle }}<\u002Fdiv>\n                  <label style=\"font-size:12px; color:#ab9683; font-weight:600;\">ชื่อสินค้า<\u002Flabel>\n                  <input value=\"{{ editorName }}\" onchange=\"{{ onEditName }}\" placeholder=\"เช่น ลาเต้เย็น\" style=\"width:100%; margin-top:6px; margin-bottom:14px; padding:13px 14px; border:1px solid #ecdfce; border-radius:12px; font-family:inherit; font-size:15px; color:#4a3526; outline:none; box-sizing:border-box;\">\n                  <label style=\"font-size:12px; color:#ab9683; font-weight:600;\">ราคา (บาท)<\u002Flabel>\n                  <input value=\"{{ editorPrice }}\" onchange=\"{{ onEditPrice }}\" type=\"number\" placeholder=\"0\" style=\"width:100%; margin-top:6px; padding:13px 14px; border:1px solid #ecdfce; border-radius:12px; font-family:inherit; font-size:15px; color:#4a3526; outline:none; box-sizing:border-box;\">\n                  <button onclick=\"{{ onSaveProduct }}\" style=\"width:100%; margin-top:20px; border:none; border-radius:18px; padding:15px 0; background:#b06a43; color:#fff; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer;\" style-active=\"transform:scale(.98)\">บันทึก<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== TOAST ===== -->\n            <sc-if value=\"{{ toastOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute; left:50%; bottom:96px; transform:translateX(-50%); background:#4a3526; color:#fff; padding:11px 18px; border-radius:24px; font-size:13px; font-weight:500; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.25); animation:toastUp .25s ease; display:flex; align-items:center; gap:8px;\">\n                <span style=\"color:#7fe3a8;\">✓<\u002Fspan>{{ toast }}\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ FRAME B — ละมุน / SOFT ============ -->\n    <div style=\"flex:none; width:430px;\">\n      \n      \n      \n    <\u002Fdiv>\n\n    <!-- ============ FRAME C — โมโน / MINIMAL ============ -->\n    <div style=\"flex:none; width:430px;\">\n      \n      \n      \n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'dashboard',\n    reportTab: 'daily',\n    pay: null,\n    editor: null,\n    toast: null,\n    nextId: 11,\n    products: [\n      { id: 1, name: 'ลาเต้', price: 55, emoji: '☕' },\n      { id: 2, name: 'อเมริกาโน่', price: 50, emoji: '☕' },\n      { id: 3, name: 'คาปูชิโน่', price: 55, emoji: '☕' },\n      { id: 4, name: 'เอสเพรสโซ่', price: 45, emoji: '☕' },\n      { id: 5, name: 'มอคค่า', price: 60, emoji: '🍫' },\n      { id: 6, name: 'ชาเขียวมัทฉะ', price: 60, emoji: '🍵' },\n      { id: 7, name: 'ชาไทยเย็น', price: 45, emoji: '🧋' },\n      { id: 8, name: 'โกโก้ปั่น', price: 65, emoji: '🍫' },\n      { id: 9, name: 'ชามะนาวโซดา', price: 45, emoji: '🍋' },\n      { id: 10, name: 'น้ำส้มคั้นสด', price: 50, emoji: '🍊' },\n    ],\n    sales: [],\n  };\n\n  constructor(props) {\n    super(props);\n    const P = this.state.products;\n    const seed = [\n      [1,'cash','08:05'],[2,'transfer','08:12'],[1,'cash','08:20'],[7,'cash','08:33'],\n      [3,'transfer','08:41'],[1,'transfer','08:55'],[6,'cash','09:10'],[2,'cash','09:18'],\n      [8,'transfer','09:32'],[1,'cash','09:45'],[7,'transfer','09:58'],[5,'cash','10:12'],\n      [3,'cash','10:25'],[1,'transfer','10:40'],[10,'cash','11:02'],[2,'transfer','11:15'],\n      [7,'cash','11:30'],[6,'transfer','11:48'],[1,'cash','12:05'],[4,'cash','12:20'],\n      [8,'cash','12:38'],[3,'transfer','12:55'],\n    ];\n    this.state.sales = seed.map((s, i) => {\n      const p = P.find(x => x.id === s[0]);\n      return { id: 'seed' + i, pid: p.id, name: p.name, emoji: p.emoji, total: p.price, method: s[1], time: s[2] };\n    });\n  }\n\n  fmt(n) { return '฿' + Math.round(n).toLocaleString('en-US'); }\n  setTab(t) { this.setState({ tab: t }); }\n  flash(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._tt);\n    this._tt = setTimeout(() => this.setState({ toast: null }), 2000);\n  }\n  openPay(p) { this.setState({ pay: p }); }\n  closePay() { this.setState({ pay: null }); }\n  doPay(method) {\n    const p = this.state.pay;\n    if (!p) return;\n    const t = new Date().toTimeString().slice(0, 5);\n    const rec = { id: 's' + Date.now(), pid: p.id, name: p.name, emoji: p.emoji, total: p.price, method, time: t };\n    this.setState(s => ({ sales: [rec, ...s.sales], pay: null }));\n    this.flash((method === 'cash' ? 'รับเงินสด ' : 'รับโอนเงิน ') + p.name + ' · ' + this.fmt(p.price));\n  }\n  delProduct(id) { this.setState(s => ({ products: s.products.filter(p => p.id !== id) })); this.flash('ลบสินค้าแล้ว'); }\n  openEditor(mode, p) {\n    this.setState({ editor: { mode, id: p ? p.id : null, name: p ? p.name : '', price: p ? String(p.price) : '', emoji: p ? p.emoji : '☕' } });\n  }\n  closeEditor() { this.setState({ editor: null }); }\n  editField(k, v) { this.setState(s => ({ editor: { ...s.editor, [k]: v } })); }\n  saveProduct() {\n    const e = this.state.editor;\n    if (!e) return;\n    const name = (e.name || '').trim();\n    const price = parseFloat(e.price) || 0;\n    if (!name) return;\n    this.setState(s => {\n      if (e.mode === 'edit') {\n        return { products: s.products.map(p => p.id === e.id ? { ...p, name, price, emoji: e.emoji } : p), editor: null };\n      }\n      return { products: [...s.products, { id: s.nextId, name, price, emoji: e.emoji }], nextId: s.nextId + 1, editor: null };\n    });\n    this.flash(e.mode === 'edit' ? 'บันทึกการแก้ไขแล้ว' : 'เพิ่มสินค้าใหม่แล้ว');\n  }\n\n  renderVals() {\n    const f = n => this.fmt(n);\n    const { tab, products, sales, pay, editor, toast, reportTab } = this.state;\n    const cash = sales.filter(s => s.method === 'cash').reduce((a, s) => a + s.total, 0);\n    const transfer = sales.filter(s => s.method === 'transfer').reduce((a, s) => a + s.total, 0);\n    const total = cash + transfer;\n    const cashPct = total ? Math.round(cash / total * 100) : 0;\n    const transferPct = total ? 100 - cashPct : 0;\n\n    const agg = {};\n    sales.forEach(s => { if (!agg[s.pid]) agg[s.pid] = { name: s.name, emoji: s.emoji, qty: 0, rev: 0 }; agg[s.pid].qty++; agg[s.pid].rev += s.total; });\n    const best = Object.values(agg).sort((a, b) => b.qty - a.qty);\n    const maxQty = best.length ? best[0].qty : 1;\n    const bestSellers = best.slice(0, 4).map((b, i) => ({ rank: i + 1, name: b.name, emoji: b.emoji, qtyStr: b.qty + ' แก้ว', revStr: f(b.rev), pctW: Math.round(b.qty / maxQty * 100) + '%' }));\n\n    const gridProducts = products.map(p => ({ ...p, priceStr: f(p.price), onTap: () => this.openPay(p) }));\n    const listProducts = products.map(p => ({ ...p, priceStr: f(p.price), onEdit: () => this.openEditor('edit', p), onDel: () => this.delProduct(p.id) }));\n    const feed = sales.slice(0, 6).map(s => ({ name: s.name, emoji: s.emoji, time: s.time, totalStr: f(s.total), methodLabel: s.method === 'cash' ? 'เงินสด' : 'โอนเงิน', col: s.method === 'cash' ? '#2f9e6b' : '#3b6fe0' }));\n\n    const wk = [['จ',1820],['อ',2140],['พ',1960],['พฤ',2480],['ศ',3120],['ส',3680],['อา',total]];\n    const wkMax = Math.max.apply(null, wk.map(w => w[1]).concat([1]));\n    const weekBars = wk.map((w, i) => ({ day: w[0], h: Math.round(w[1] / wkMax * 100) + '%', str: f(w[1]), col: i === 6 ? '#b06a43' : '#ecdcc8' }));\n    const mo = [['สัปดาห์ 1',14200],['สัปดาห์ 2',16800],['สัปดาห์ 3',15400],['สัปดาห์ 4',12060]];\n    const moMax = Math.max.apply(null, mo.map(m => m[1]).concat([1]));\n    const monthBars = mo.map(m => ({ day: m[0], h: Math.round(m[1] / moMax * 100) + '%', str: f(m[1]), col: '#c08a5a' }));\n    const monthTotal = mo.reduce((a, m) => a + m[1], 0);\n\n    const NA = '#b06a43', NI = '#c3b3a2';\n    return {\n      isDash: tab === 'dashboard', isHub: tab === 'hub', isProducts: tab === 'products', isSales: tab === 'sales', isReports: tab === 'reports', isAI: tab === 'ai',\n      goDash: () => this.setTab('dashboard'), goHub: () => this.setTab('hub'), goProducts: () => this.setTab('products'), goSales: () => this.setTab('sales'), goReports: () => this.setTab('reports'), goAi: () => this.setTab('ai'),\n      cHome: tab === 'dashboard' ? NA : NI, cHub: tab === 'hub' ? NA : NI, cProd: tab === 'products' ? NA : NI, cRep: tab === 'reports' ? NA : NI, cAi: tab === 'ai' ? NA : NI,\n      totalStr: f(total), cashStr: f(cash), transferStr: f(transfer), countStr: sales.length + ' รายการ',\n      cashPct: cashPct + '%', transferPct: transferPct + '%',\n      bestSellers, gridProducts, listProducts, feed, weekBars, monthBars, monthTotalStr: f(monthTotal),\n      reportDaily: reportTab === 'daily', reportMonthly: reportTab === 'monthly',\n      goDaily: () => this.setState({ reportTab: 'daily' }), goMonthly: () => this.setState({ reportTab: 'monthly' }),\n      rTabDailyBg: reportTab === 'daily' ? '#b06a43' : 'transparent', rTabDailyC: reportTab === 'daily' ? '#fff' : 'rgba(255,255,255,.65)',\n      rTabMonthlyBg: reportTab === 'monthly' ? '#b06a43' : 'transparent', rTabMonthlyC: reportTab === 'monthly' ? '#fff' : 'rgba(255,255,255,.65)',\n      payOpen: !!pay, payName: pay ? pay.name : '', payEmoji: pay ? pay.emoji : '', payPriceStr: pay ? f(pay.price) : '',\n      onPayCash: () => this.doPay('cash'), onPayTransfer: () => this.doPay('transfer'), onClosePay: () => this.closePay(),\n      editorOpen: !!editor, editorTitle: editor ? (editor.mode === 'edit' ? 'แก้ไขสินค้า' : 'เพิ่มสินค้าใหม่') : '',\n      editorName: editor ? editor.name : '', editorPrice: editor ? editor.price : '',\n      onEditName: e => this.editField('name', e.target.value), onEditPrice: e => this.editField('price', e.target.value),\n      onSaveProduct: () => this.saveProduct(), onCloseEditor: () => this.closeEditor(), onAddProduct: () => this.openEditor('add', null),\n      stop: e => e.stopPropagation(),\n      toast, toastOpen: !!toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
