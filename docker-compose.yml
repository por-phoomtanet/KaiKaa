services:
  mongo:
    image: mongo:7
    container_name: kaikaa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./services/api
    container_name: kaikaa-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "kaikaa"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      OPENROUTER_KEY: "${OPENROUTER_KEY:-}"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
